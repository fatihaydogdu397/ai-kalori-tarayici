<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>2A — Bento + Kompakt Makro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
.bento-meal { position: relative; border-radius: 24px; overflow: hidden; background-size: cover; }
.bento-meal::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 25%, transparent 45%, rgba(0,0,0,0.92));
}
.bm-tag {
  position: absolute; top: 14px; left: 14px; z-index: 3;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
  padding: 5px 12px; border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--lime);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.bm-content {
  position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 3;
}
.bm-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.bm-kcal-row {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px;
}
.bm-kcal { font-size: 32px; font-weight: 800; color: var(--lime); letter-spacing: -0.02em; line-height:1; }
.bm-kcal-unit { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.bm-macro-line {
  display: flex; gap: 10px;
  font-size: 13px; font-weight: 700;
}
.bm-macro-line span { display: inline-flex; align-items: center; gap: 4px; }
.bm-macro-line .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
/* Larger card variant */
.bento-meal.large .bm-name { font-size: 26px; margin-bottom: 14px; }
.bento-meal.large .bm-kcal { font-size: 48px; }
.bento-meal.large .bm-macro-line { font-size: 16px; gap: 14px; }
.bento-meal.large .bm-macro-line .dot { width: 8px; height: 8px; }
</style>
</head>
<body>
<div class="story">
  <div class="bg-base"></div>
  <div class="glow-blob" style="width:550px; height:550px; background:var(--lime); top:600px; left:-150px;"></div>
  <div class="glow-blob" style="width:500px; height:500px; background:var(--coral); top:100px; right:-100px;"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="brand"><div class="brand-dot">e</div><span>eatiq</span></div>
    <div class="date-pill">29 Nis · Salı</div>
  </div>

  <div class="title-block" style="top:200px; left:60px; right:60px;">
    <div class="title-eyebrow">Bugünün Günlüğü</div>
    <div class="title">3 öğün,<br>1 hedef.</div>
  </div>

  <!-- Bento: 1 büyük + 2 küçük -->
  <div style="position:absolute; top:540px; left:60px; right:60px; height:920px; display:grid; grid-template-columns:1.4fr 1fr; grid-template-rows:1fr 1fr; gap:16px;">
    <!-- Hero -->
    <div class="bento-meal large" style="grid-row: 1 / 3; background: linear-gradient(135deg, #2a4a2a, #5a8b3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 40% 30%, #d4a02a 0%, transparent 35%), radial-gradient(circle at 60% 70%, #2a8b3a 0%, transparent 40%);"></div>
      <div class="bm-tag">Kahvaltı</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">320</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color"><span class="dot protein-bg"></span>P 18g</span>
          <span class="carb-color"><span class="dot carb-bg"></span>K 32g</span>
          <span class="fat-color"><span class="dot fat-bg"></span>Y 14g</span>
        </div>
      </div>
    </div>
    <!-- Top right -->
    <div class="bento-meal" style="background: linear-gradient(135deg, #8b5a2b, #d4622a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #f4a050 0%, transparent 40%);"></div>
      <div class="bm-tag">Öğle</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">240</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color"><span class="dot protein-bg"></span>15g</span>
          <span class="carb-color"><span class="dot carb-bg"></span>38g</span>
          <span class="fat-color"><span class="dot fat-bg"></span>6g</span>
        </div>
      </div>
    </div>
    <!-- Bottom right -->
    <div class="bento-meal" style="background: linear-gradient(135deg, #4a2a4a, #8b3a8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d44a8b 0%, transparent 40%);"></div>
      <div class="bm-tag">Akşam</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">540</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color"><span class="dot protein-bg"></span>55g</span>
          <span class="carb-color"><span class="dot carb-bg"></span>42g</span>
          <span class="fat-color"><span class="dot fat-bg"></span>18g</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Total summary -->
  <div class="macro-card" style="position:absolute; bottom:220px; left:60px; right:60px; padding:24px 36px;">
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div style="font-size:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.15em; font-weight:600;">Toplam</div>
        <div style="font-size:56px; font-weight:800; color:var(--lime); letter-spacing:-0.04em; line-height:1; margin-top:4px;">1.100 <span style="font-size:20px; color:var(--text-muted); font-weight:500;">kcal</span></div>
      </div>
      <div style="display:flex; gap:14px;">
        <div style="text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--violet);">88g</div>
          <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Protein</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--amber);">112g</div>
          <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Karb</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:24px; font-weight:800; color:var(--coral);">38g</div>
          <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Yağ</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
