<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>V3 — Yan Kart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
.meal-row { display:flex; gap:14px; height: 280px; }
.meal-row.reverse { flex-direction: row-reverse; }
.meal-photo {
  flex: 1.2;
  background-size: cover;
  background-position: center;
  border-radius: 24px;
  position: relative;
  overflow: hidden;
}
.meal-photo::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.7));
}
.meal-photo .label {
  position: absolute; top:14px; left:14px; z-index: 2;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
  padding: 6px 12px; border-radius: 100px;
  font-size: 13px; font-weight: 700;
  color: var(--lime); text-transform: uppercase; letter-spacing: 0.1em;
}
.meal-photo .name {
  position: absolute; bottom: 14px; left:14px; right:14px; z-index:2;
  font-size: 22px; font-weight: 700;
}
.meal-data {
  flex: 1;
  background: rgba(28,28,42,0.6);
  backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.meal-data .kcal {
  font-size: 56px; font-weight: 800; color: var(--lime); letter-spacing: -0.04em; line-height: 1;
}
.meal-data .kcal-unit { font-size: 18px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
.meal-data .macros { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.meal-data .macro {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 12px;
  background: rgba(255,255,255,0.04);
}
.meal-data .macro-left { display: flex; align-items: center; gap: 8px; }
.meal-data .macro-dot { width: 10px; height: 10px; border-radius: 50%; }
.meal-data .macro-name { font-size: 13px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
.meal-data .macro-val { font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="story">
  <div class="bg-base"></div>
  <div class="glow-blob" style="width:600px; height:600px; background:var(--lime); top:200px; right:-200px;"></div>
  <div class="glow-blob" style="width:550px; height:550px; background:var(--mint); bottom:200px; left:-150px;"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="brand"><div class="brand-dot">e</div><span>eatiq</span></div>
    <div class="date-pill">29 Nis · Salı</div>
  </div>

  <div class="title-block" style="top:200px; left:60px; right:60px;">
    <div class="title-eyebrow">Bugün</div>
    <div class="title">Bilinçli<br>tabaklar.</div>
  </div>

  <div style="position:absolute; top:540px; left:60px; right:60px; display:flex; flex-direction:column; gap:18px;">
    <!-- Meal 1 -->
    <div class="meal-row">
      <div class="meal-photo" style="background: linear-gradient(135deg, #2a4a2a, #5a8b3a);">
        <div style="position:absolute; inset:0; background: radial-gradient(circle at 40% 30%, #d4a02a 0%, transparent 35%), radial-gradient(circle at 60% 70%, #2a8b3a 0%, transparent 40%);"></div>
        <div class="label">Kahvaltı · 08:30</div>
      </div>
      <div class="meal-data">
        <div class="kcal">320</div>
        <div class="kcal-unit">kalori</div>
        <div class="macros">
          <div class="macro"><div class="macro-left"><div class="macro-dot protein-bg"></div><div class="macro-name">Protein</div></div><div class="macro-val protein-color">18g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot carb-bg"></div><div class="macro-name">Karb</div></div><div class="macro-val carb-color">32g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot fat-bg"></div><div class="macro-name">Yağ</div></div><div class="macro-val fat-color">14g</div></div>
        </div>
      </div>
    </div>
    <!-- Meal 2 (reversed) -->
    <div class="meal-row reverse">
      <div class="meal-photo" style="background: linear-gradient(135deg, #8b5a2b, #d4622a);">
        <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #f4a050 0%, transparent 40%);"></div>
        <div class="label">Öğle · 13:15</div>
      </div>
      <div class="meal-data">
        <div class="kcal">240</div>
        <div class="kcal-unit">kalori</div>
        <div class="macros">
          <div class="macro"><div class="macro-left"><div class="macro-dot protein-bg"></div><div class="macro-name">Protein</div></div><div class="macro-val protein-color">15g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot carb-bg"></div><div class="macro-name">Karb</div></div><div class="macro-val carb-color">38g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot fat-bg"></div><div class="macro-name">Yağ</div></div><div class="macro-val fat-color">6g</div></div>
        </div>
      </div>
    </div>
    <!-- Meal 3 -->
    <div class="meal-row">
      <div class="meal-photo" style="background: linear-gradient(135deg, #4a2a4a, #8b3a8b);">
        <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d44a8b 0%, transparent 40%);"></div>
        <div class="label">Akşam · 19:45</div>
      </div>
      <div class="meal-data">
        <div class="kcal">540</div>
        <div class="kcal-unit">kalori</div>
        <div class="macros">
          <div class="macro"><div class="macro-left"><div class="macro-dot protein-bg"></div><div class="macro-name">Protein</div></div><div class="macro-val protein-color">55g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot carb-bg"></div><div class="macro-name">Karb</div></div><div class="macro-val carb-color">42g</div></div>
          <div class="macro"><div class="macro-left"><div class="macro-dot fat-bg"></div><div class="macro-name">Yağ</div></div><div class="macro-val fat-color">18g</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
