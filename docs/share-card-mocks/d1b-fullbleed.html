<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>D1-B — Full Bleed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
.bg-photo {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #4a3520 0%, #8b5a2b 100%);
}
.bg-photo::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 30% 30%, #d4622a 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, #f4a050 0%, transparent 45%),
    radial-gradient(circle at 50% 80%, #2a5a2a 0%, transparent 35%);
}
.bg-photo::after {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(15,15,20,0.55) 0%, rgba(15,15,20,0.2) 30%, rgba(15,15,20,0.4) 60%, rgba(15,15,20,0.95) 100%);
}

.tag-pill {
  position: absolute;
  top: 200px; left: 60px;
  z-index: 5;
  background: var(--lime); color: var(--void);
  padding: 10px 22px;
  border-radius: 100px;
  font-size: 22px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
}

.kcal-mega {
  position: absolute;
  bottom: 580px; left: 60px; right: 60px;
  z-index: 5;
  text-align: left;
}
.kcal-mega .num {
  font-size: 280px;
  font-weight: 900;
  color: var(--lime);
  letter-spacing: -0.06em;
  line-height: 0.9;
}
.kcal-mega .lbl {
  font-size: 28px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-weight: 600;
  margin-top: 6px;
}

.glass-data {
  position: absolute;
  bottom: 240px; left: 60px; right: 60px;
  z-index: 5;
  background: rgba(28,28,42,0.5);
  backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px;
  padding: 32px 36px;
  display: flex;
  justify-content: space-between;
}
.glass-data .gd-item { text-align: center; flex: 1; }
.glass-data .gd-val {
  font-size: 56px; font-weight: 800; letter-spacing: -0.03em; line-height: 1;
}
.glass-data .gd-name {
  font-size: 18px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.12em;
  font-weight: 600; margin-top: 10px;
}
.glass-data .gd-divider {
  width: 1px;
  background: rgba(255,255,255,0.08);
}
</style>
</head>
<body>
<div class="story">
  <div class="bg-photo"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="brand"><div class="brand-dot">e</div><span>eatiq</span></div>
    <div class="date-pill">29 Nis · Salı</div>
  </div>

  <!-- Big tag -->
  <div class="tag-pill">Bugünün Öğünü</div>

  <!-- Mega kcal -->
  <div class="kcal-mega">
    <div class="num">487</div>
    <div class="lbl">Kalori</div>
  </div>

  <!-- Glass macro card -->
  <div class="glass-data">
    <div class="gd-item">
      <div class="gd-val protein-color">42g</div>
      <div class="gd-name">Protein</div>
    </div>
    <div class="gd-divider"></div>
    <div class="gd-item">
      <div class="gd-val carb-color">38g</div>
      <div class="gd-name">Karb</div>
    </div>
    <div class="gd-divider"></div>
    <div class="gd-item">
      <div class="gd-val fat-color">15g</div>
      <div class="gd-name">Yağ</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
