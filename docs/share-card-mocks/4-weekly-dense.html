<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haftalık Yoğun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="story">
  <div class="bg-base"></div>
  <div class="glow-blob" style="width:700px; height:700px; background:var(--lime); top:400px; right:-250px;"></div>
  <div class="glow-blob" style="width:600px; height:600px; background:var(--violet); bottom:-100px; left:-200px;"></div>
  <div class="glow-blob" style="width:400px; height:400px; background:var(--coral); top:0; left:50%;"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="brand">
      <div class="brand-dot">e</div>
      <span>eatiq</span>
    </div>
    <div class="date-pill">22 – 28 Nis</div>
  </div>

  <!-- Title compact -->
  <div class="title-block" style="top:200px; left:60px; right:60px;">
    <div class="title-eyebrow">Haftanın Wrap'i</div>
    <div class="title" style="font-size:64px;">21 öğün, 7 gün,<br>0 mola.</div>
  </div>

  <!-- Mosaic: 14 photos in dense pinterest-style -->
  <div style="position:absolute; top:480px; left:60px; right:60px; height:900px; display:grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 110px; gap:10px;">
    <!-- Day 1 - Pzt -->
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #2a4a2a, #5a8b3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d4a02a 0%, transparent 40%);"></div>
      <div style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:6px; font-size:11px; color:var(--lime); font-weight:700;">PZT</div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #8b5a2b, #d4622a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #f4a050 0%, transparent 40%);"></div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #4a2a4a, #8b3a8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d44a8b 0%, transparent 40%);"></div>
    </div>
    <!-- Day 2 - Sal -->
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #2a3a4a, #3a5a8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #4a8bd4 0%, transparent 40%);"></div>
      <div style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:6px; font-size:11px; color:var(--lime); font-weight:700;">SAL</div>
    </div>

    <div class="photo" style="grid-row: span 3; grid-column: span 2; background: linear-gradient(135deg, #4a3520, #8b5a2b);">
      <div style="position:absolute; inset:0; background:
        radial-gradient(circle at 30% 40%, #d4622a 0%, transparent 35%),
        radial-gradient(circle at 70% 60%, #f4a050 0%, transparent 35%);
      "></div>
      <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; font-size:12px; color:var(--lime); font-weight:700;">ÇAR</div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #4a2a2a, #8b3a3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d4632a 0%, transparent 40%);"></div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #2a4a3a, #3a8b5a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #2adc8b 0%, transparent 40%);"></div>
    </div>

    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #4a402a, #8b7a3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d4a02a 0%, transparent 40%);"></div>
      <div style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:6px; font-size:11px; color:var(--lime); font-weight:700;">PER</div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #3a2a4a, #5a3a8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #8b4ad4 0%, transparent 40%);"></div>
    </div>

    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #4a352a, #8b6a3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d4852a 0%, transparent 40%);"></div>
      <div style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:6px; font-size:11px; color:var(--lime); font-weight:700;">CUM</div>
    </div>
    <div class="photo" style="grid-row: span 2; background: linear-gradient(135deg, #2a4a4a, #3a8b8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #2adcd4 0%, transparent 40%);"></div>
    </div>
    <div class="photo" style="grid-row: span 2; grid-column: span 2; background: linear-gradient(135deg, #4a2a3a, #8b3a5a);">
      <div style="position:absolute; inset:0; background:
        radial-gradient(circle at 40% 50%, #d44a6a 0%, transparent 40%),
        radial-gradient(circle at 70% 40%, #f4a050 0%, transparent 35%);
      "></div>
      <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; font-size:12px; color:var(--lime); font-weight:700;">CMT</div>
      <div class="photo-meta">
        <div style="background:rgba(200,241,53,0.2); color:var(--lime); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700;">+4 daha</div>
      </div>
    </div>
  </div>

  <!-- Compact total bar -->
  <div class="macro-card" style="position:absolute; bottom:220px; left:60px; right:60px; padding:28px 36px; display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div style="font-size:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.15em; font-weight:600;">Toplam</div>
      <div style="font-size:64px; font-weight:800; letter-spacing:-0.04em; color:var(--lime); line-height:1; margin-top:4px;">12.940 <span style="font-size:24px; color:var(--text-muted); font-weight:500;">kcal</span></div>
    </div>
    <div style="display:flex; gap:18px;">
      <div style="text-align:center;">
        <div style="font-size:32px; font-weight:800; color:var(--violet); letter-spacing:-0.02em;">560g</div>
        <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; margin-top:2px;">Protein</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:32px; font-weight:800; color:var(--amber); letter-spacing:-0.02em;">980g</div>
        <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; margin-top:2px;">Karb</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:32px; font-weight:800; color:var(--coral); letter-spacing:-0.02em;">340g</div>
        <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; margin-top:2px;">Yağ</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
