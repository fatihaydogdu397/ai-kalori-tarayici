<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>D4-B — Hero + 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
.bento-meal { position: relative; border-radius: 24px; overflow: hidden; background-size: cover; }
.bento-meal::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 25%, transparent 45%, rgba(0,0,0,0.92));
}
.bm-tag {
  position: absolute; top: 14px; left: 14px; z-index: 3;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
  padding: 5px 12px; border-radius: 100px;
  font-size: 13px; font-weight: 700; color: var(--lime);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.bm-content { position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 3; }
.bm-kcal-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.bm-kcal { font-size: 32px; font-weight: 800; color: var(--lime); letter-spacing: -0.02em; line-height:1; }
.bm-kcal-unit { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.bm-macro-line { display: flex; gap: 10px; font-size: 13px; font-weight: 700; }
.bm-macro-line span { display: inline-flex; align-items: center; gap: 4px; }
.bm-macro-line .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.bento-meal.large .bm-tag { font-size: 15px; padding: 7px 14px; }
.bento-meal.large .bm-kcal { font-size: 56px; }
.bento-meal.large .bm-kcal-unit { font-size: 16px; }
.bento-meal.large .bm-macro-line { font-size: 17px; gap: 16px; }
.bento-meal.large .bm-macro-line .dot { width: 8px; height: 8px; }
</style>
</head>
<body>
<div class="story">
  <div class="bg-base"></div>
  <div class="glow-blob" style="width:550px; height:550px; background:var(--lime); top:600px; left:-150px;"></div>
  <div class="glow-blob" style="width:500px; height:500px; background:var(--coral); top:100px; right:-100px;"></div>
  <div class="grain"></div>

  <div class="header">
    <div class="brand"><div class="brand-dot">e</div><span>eatiq</span></div>
    <div class="date-pill">29 Nis · Salı</div>
  </div>

  <div class="title-block" style="top:200px; left:60px; right:60px;">
    <div class="title-eyebrow">Bugünün Günlüğü</div>
    <div class="title">4 öğün, kontrol.</div>
  </div>

  <!-- 1 hero + 3 column -->
  <div style="position:absolute; top:540px; left:60px; right:60px; height:920px; display:grid; grid-template-columns:1.5fr 1fr; grid-template-rows:1fr 1fr 1fr; gap:14px;">
    <!-- Hero (Akşam) -->
    <div class="bento-meal large" style="grid-row: 1 / 4; background: linear-gradient(135deg, #4a2a4a, #8b3a8b);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d44a8b 0%, transparent 40%);"></div>
      <div class="bm-tag">Akşam</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">620</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color"><span class="dot protein-bg"></span>P 48g</span>
          <span class="carb-color"><span class="dot carb-bg"></span>K 52g</span>
          <span class="fat-color"><span class="dot fat-bg"></span>Y 24g</span>
        </div>
      </div>
    </div>
    <!-- Kahvaltı -->
    <div class="bento-meal" style="background: linear-gradient(135deg, #2a4a2a, #5a8b3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 40% 30%, #d4a02a 0%, transparent 35%), radial-gradient(circle at 60% 70%, #2a8b3a 0%, transparent 40%);"></div>
      <div class="bm-tag">Kahvaltı</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">320</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color">18g</span>
          <span class="carb-color">32g</span>
          <span class="fat-color">14g</span>
        </div>
      </div>
    </div>
    <!-- Öğle -->
    <div class="bento-meal" style="background: linear-gradient(135deg, #8b5a2b, #d4622a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #f4a050 0%, transparent 40%);"></div>
      <div class="bm-tag">Öğle</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">540</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color">32g</span>
          <span class="carb-color">58g</span>
          <span class="fat-color">22g</span>
        </div>
      </div>
    </div>
    <!-- Ara öğün -->
    <div class="bento-meal" style="background: linear-gradient(135deg, #4a402a, #8b7a3a);">
      <div style="position:absolute; inset:0; background: radial-gradient(circle at 50% 50%, #d4a02a 0%, transparent 40%);"></div>
      <div class="bm-tag">Ara Öğün</div>
      <div class="bm-content">
        <div class="bm-kcal-row">
          <div class="bm-kcal">180</div>
          <div class="bm-kcal-unit">kcal</div>
        </div>
        <div class="bm-macro-line">
          <span class="protein-color">10g</span>
          <span class="carb-color">22g</span>
          <span class="fat-color">6g</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Total -->
  <div class="macro-card" style="position:absolute; bottom:220px; left:60px; right:60px; padding:24px 32px;">
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div style="font-size:14px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.15em; font-weight:600;">Toplam · 4 öğün</div>
        <div style="font-size:56px; font-weight:800; color:var(--lime); letter-spacing:-0.04em; line-height:1; margin-top:4px;">1.660 <span style="font-size:18px; color:var(--text-muted); font-weight:500;">kcal</span></div>
      </div>
      <div style="display:flex; gap:18px;">
        <div style="text-align:center;"><div style="font-size:28px; font-weight:800;" class="protein-color">108g</div><div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Protein</div></div>
        <div style="text-align:center;"><div style="font-size:28px; font-weight:800;" class="carb-color">164g</div><div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Karb</div></div>
        <div style="text-align:center;"><div style="font-size:28px; font-weight:800;" class="fat-color">66g</div><div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;">Yağ</div></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
