<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tek Öğün — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="story">
  <div class="bg-base"></div>
  <div class="glow-blob" style="width:600px; height:600px; background:var(--lime); top:-100px; right:-150px;"></div>
  <div class="glow-blob" style="width:500px; height:500px; background:var(--violet); bottom:200px; left:-100px;"></div>
  <div class="grain"></div>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-dot">e</div>
      <span>eatiq</span>
    </div>
    <div class="date-pill">29 Nis · Salı</div>
  </div>

  <!-- Hero photo -->
  <div class="photo" style="
    position:absolute;
    top:240px; left:60px; right:60px;
    height:820px;
    background-image: linear-gradient(135deg, #4a3520 0%, #8b5a2b 100%);
  ">
    <!-- Mock food image gradient -->
    <div style="position:absolute; inset:0; background:
      radial-gradient(circle at 30% 40%, #d4622a 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, #f4a050 0%, transparent 35%),
      radial-gradient(circle at 50% 80%, #2a5a2a 0%, transparent 30%);
    "></div>
    <div class="photo-meta">
    </div>
  </div>

  <!-- Title block -->
  <div class="title-block" style="top:1090px; left:60px; right:60px;">
    <div class="title-eyebrow">Bugünün Öğünü</div>
    <div class="title">Hedefe<br>tam isabet.</div>
  </div>

  <!-- Macro card -->
  <div class="macro-card" style="position:absolute; bottom:240px; left:60px; right:60px;">
    <div class="kcal-display">
      <div class="kcal-number">487</div>
      <div class="kcal-label">Kalori</div>
    </div>
    <div class="macro-row">
      <div class="macro-item">
<div class="macro-value protein-color">42g</div>
        <div class="macro-name">Protein</div>
      </div>
      <div class="macro-item">
        <div class="macro-value carb-color">38g</div>
        <div class="macro-name">Karb</div>
      </div>
      <div class="macro-item">
        <div class="macro-value fat-color">15g</div>
        <div class="macro-name">Yağ</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-handle">@eatiq</div>
    <div class="footer-cta">Sen de dene →</div>
  </div>
</div>
</body>
</html>
