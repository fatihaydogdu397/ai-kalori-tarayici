name: ai_kalori_tarayici
description: "AI destekli kalori tarayıcı - Yemeğin fotoğrafını çek, kalorini öğren!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Kamera & Görsel
  image_picker: ^1.1.2

  # HTTP & API
  http: ^1.2.2

  # State Management
  provider: ^6.1.2

  # Lokal Veritabanı (Geçmiş)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Animasyon
  shimmer: ^3.0.0

  # Diğer
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  percent_indicator: ^4.2.3
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
