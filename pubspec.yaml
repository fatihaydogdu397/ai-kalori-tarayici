name: ai_kalori_tarayici
description: "AI destekli kalori tarayıcı - Yemeğin fotoğrafını çek, kalorini öğren!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Kamera & Görsel
  image_picker: ^1.1.2

  # HTTP & API
  http: ^1.2.2

  # State Management
  provider: ^6.1.2

  # Lokal Veritabanı (Geçmiş)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Animasyon
  shimmer: ^3.0.0

  # Diğer
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  percent_indicator: ^4.2.3
  fl_chart: ^0.69.0
  purchases_flutter: ^8.8.0
  flutter_svg: ^2.0.10+1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  health: ^12.2.0
  url_launcher: ^6.3.0
  mobile_scanner: ^7.0.0
  flutter_image_compress: ^2.4.0
  home_widget: ^0.9.0
  flutter_screenutil: ^5.9.3
  path_provider: ^2.1.5

  # Backend API
  flutter_secure_storage: ^9.2.2

  # Social Sign-In (EAT-116)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.5

  # Blood test upload (PDF + image picking)
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
